<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 05 Privacy</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      padding: 78px 74px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(150deg, #052e16 0%, #0f766e 45%, #1d4ed8 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 72px;
      line-height: 1.1;
      font-weight: 900;
    }
    .point {
      border-radius: 24px;
      padding: 28px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.3);
      font-size: 36px;
      line-height: 1.45;
      font-weight: 700;
    }
    .small {
      margin-top: auto;
      font-size: 30px;
      line-height: 1.5;
      color: #ccfbf1;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>隐私边界写清楚</h1>
  <div class="point">默认本地处理复制内容，不上传复制文本。</div>
  <div class="point">仅聚焦“复制后的格式整理”，不改写原网页业务数据。</div>
  <div class="point">链接可追踪（UTM），方便复盘但不暴露用户复制内容。</div>
  <div class="small">对外口径与 CWS/README 一致：AI 友好复制、效率提升、隐私优先。</div>
</body>
</html>
