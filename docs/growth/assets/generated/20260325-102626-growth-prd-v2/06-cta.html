<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>CTA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(150deg, #0f172a 0%, #111827 35%, #312e81 100%);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 78px;
    }
    h1 { margin: 0; font-size: 86px; line-height: 1.08; font-weight: 900; }
    .sub { margin-top: 20px; font-size: 42px; line-height: 1.35; font-weight: 700; color: #c7d2fe; }
    .cta {
      margin-top: 46px;
      background: linear-gradient(90deg, #f97316, #ef4444);
      border-radius: 20px;
      padding: 26px 30px;
      font-size: 46px;
      font-weight: 900;
      line-height: 1.2;
      width: fit-content;
      color: #fff;
      box-shadow: 0 18px 40px rgba(239, 68, 68, 0.35);
    }
    .link {
      margin-top: 34px;
      font-size: 30px;
      line-height: 1.45;
      color: #93c5fd;
      word-break: break-all;
    }
    .hint { margin-top: 22px; font-size: 32px; line-height: 1.4; color: #fde68a; font-weight: 700; }
  </style>
</head>
<body>
  <h1>现在就试试 Copylot</h1>
  <div class="sub">把“复制 + 清洗 + 整理”压缩成一个动作</div>
  <div class="cta">👉 打开官网 / 安装扩展，今天就省 30 分钟</div>
  <div class="link">官网：copy.useai.online<br>商店：chromewebstore.google.com/detail/ai-copilot--magiccopy/ehfglnbhoefcdedpkcdnainiifpflbic</div>
  <div class="hint">评论区回“模板”，我发你可直接复用的 Prompt 清单。</div>
</body>
</html>
