<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Use Cases</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #172554 0%, #1e3a8a 50%, #1d4ed8 100%);
      color: #eff6ff;
      padding: 82px 74px;
    }
    h1 { margin: 0 0 30px; font-size: 72px; line-height: 1.14; font-weight: 900; }
    .line {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 16px 0;
      font-size: 38px;
      line-height: 1.35;
      font-weight: 700;
    }
    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #60a5fa;
      display: grid;
      place-items: center;
      color: #0c4a6e;
      font-weight: 900;
    }
    .block {
      margin-top: 32px;
      background: rgba(15, 23, 42, 0.32);
      border: 2px solid rgba(191, 219, 254, 0.5);
      border-radius: 24px;
      padding: 24px 28px;
      font-size: 34px;
      line-height: 1.45;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>这些场景特别好用</h1>
  <div class="line"><div class="icon">1</div><div>竞品调研：多页资料一键拼成结构化笔记</div></div>
  <div class="line"><div class="icon">2</div><div>运营写作：网页素材快速转成 AI 可用草稿</div></div>
  <div class="line"><div class="icon">3</div><div>学习复盘：表格、代码、段落统一清洗输出</div></div>
  <div class="block">你不用再在“复制后整理”上浪费精力，把时间留给真正的思考和产出。</div>
</body>
</html>
