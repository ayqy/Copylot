<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 01 Cover</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      padding: 86px 78px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #fff;
      background: linear-gradient(155deg, #0f172a 0%, #7c3aed 50%, #f97316 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .badge {
      width: fit-content;
      font-size: 34px;
      font-weight: 900;
      padding: 12px 24px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.42);
      background: rgba(255,255,255,0.14);
    }
    h1 {
      margin: 34px 0 18px;
      font-size: 90px;
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .sub {
      font-size: 48px;
      line-height: 1.35;
      font-weight: 700;
      max-width: 920px;
    }
    .card {
      margin-top: auto;
      font-size: 42px;
      line-height: 1.35;
      font-weight: 800;
      border-radius: 28px;
      padding: 30px 34px;
      background: rgba(255,255,255,0.14);
      border: 2px solid rgba(255,255,255,0.34);
    }
    .brand {
      position: absolute;
      right: 70px;
      bottom: 52px;
      font-size: 40px;
      font-weight: 900;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="badge">场景：竞品分析 / 周报汇总 / 方案提案</div>
  <h1>网页复制
别再重复返工</h1>
  <div class="sub">3 步直达干净输入
每天省下 20~40 分钟</div>
  <div class="card">复制结果可直接喂给 AI，减少格式清洗与二次粘贴</div>
  <div class="brand">Copylot</div>
</body>
</html>
