<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Three Steps</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #fff7ed 0%, #ffedd5 40%, #fed7aa 100%);
      color: #7c2d12;
      padding: 84px 76px;
    }
    h1 { margin: 0 0 30px; font-size: 74px; line-height: 1.12; font-weight: 900; }
    .step {
      background: rgba(255,255,255,0.85);
      border: 2px solid #fb923c;
      border-radius: 24px;
      padding: 28px 30px;
      margin-bottom: 24px;
    }
    .step .idx { font-size: 38px; font-weight: 900; color: #ea580c; }
    .step .txt { margin-top: 8px; font-size: 40px; line-height: 1.35; font-weight: 700; }
    .footer { margin-top: 18px; font-size: 34px; line-height: 1.45; font-weight: 700; color: #9a3412; }
  </style>
</head>
<body>
  <h1>上手只要 3 步</h1>
  <div class="step">
    <div class="idx">STEP 1</div>
    <div class="txt">安装 Copylot，打开任意网页文章或文档</div>
  </div>
  <div class="step">
    <div class="idx">STEP 2</div>
    <div class="txt">单击/双击复制，或按住 Shift 连续追加摘录</div>
  </div>
  <div class="step">
    <div class="idx">STEP 3</div>
    <div class="txt">输出 Markdown / CSV，直接用于 AI 对话或笔记整理</div>
  </div>
  <div class="footer">适合：内容运营、产品经理、学生论文、开发者调研整理。</div>
</body>
</html>
