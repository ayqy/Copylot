<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 04 Three Steps</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      padding: 76px 70px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #fff;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      flex-direction: column;
    }
    h1 {
      margin: 0 0 28px;
      font-size: 72px;
      font-weight: 900;
      line-height: 1.1;
    }
    .step {
      display: flex;
      gap: 20px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 24px 24px;
      margin-bottom: 20px;
    }
    .num {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #f59e0b;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 900;
      flex: none;
    }
    .text .t1 {
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .text .t2 {
      font-size: 31px;
      line-height: 1.45;
      color: #e2e8f0;
      font-weight: 600;
    }
    .end {
      margin-top: auto;
      font-size: 40px;
      font-weight: 900;
      color: #fcd34d;
    }
  </style>
</head>
<body>
  <h1>3 步跑通网页整理工作流</h1>
  <div class="step">
    <div class="num">1</div>
    <div class="text">
      <div class="t1">复制核心区块</div>
      <div class="t2">单击/双击网页内容，先拿到干净主体文本。</div>
    </div>
  </div>
  <div class="step">
    <div class="num">2</div>
    <div class="text">
      <div class="t1">结构化关键信息</div>
      <div class="t2">遇到表格一键转 Markdown / CSV，减少返工。</div>
    </div>
  </div>
  <div class="step">
    <div class="num">3</div>
    <div class="text">
      <div class="t1">合并并输入 AI</div>
      <div class="t2">按住 Shift 追加多页素材，直接得到可分析输入。</div>
    </div>
  </div>
  <div class="end">结果：复制后几乎不用二次清洗，直接进入思考阶段</div>
</body>
</html>
