<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 01 Cover</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #111827 0%, #7c3aed 45%, #f43f5e 100%);
      color: #fff;
      padding: 84px 76px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .badge {
      width: fit-content;
      font-size: 34px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 999px;
      padding: 12px 24px;
    }
    h1 {
      margin: 34px 0 18px;
      font-size: 94px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .sub {
      font-size: 48px;
      line-height: 1.35;
      font-weight: 700;
      max-width: 900px;
    }
    .card {
      margin-top: auto;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-radius: 28px;
      padding: 30px 34px;
      font-size: 44px;
      line-height: 1.35;
      font-weight: 800;
    }
    .brand {
      position: absolute;
      right: 70px;
      bottom: 52px;
      font-size: 40px;
      font-weight: 900;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="badge">调研写作效率实测</div>
  <h1>网页复制<br>别再手动洗</h1>
  <div class="sub">3 步变 AI 可直接用内容<br/>每天省下 20~40 分钟</div>
  <div class="card">适用场景：竞品调研 / 周报整理 / 提示词输入准备</div>
  <div class="brand">Copylot</div>
</body>
</html>
