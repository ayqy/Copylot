<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Feature Stack</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(145deg, #111827 0%, #1f2937 45%, #0f172a 100%);
      color: #f8fafc;
      padding: 76px 70px;
    }
    h1 { margin: 0; font-size: 72px; line-height: 1.15; font-weight: 900; }
    .cards { margin-top: 38px; display: grid; gap: 22px; }
    .card {
      background: rgba(15, 23, 42, 0.62);
      border: 2px solid rgba(56, 189, 248, 0.46);
      border-radius: 22px;
      padding: 28px;
    }
    .card h2 { margin: 0 0 10px; font-size: 42px; font-weight: 900; color: #38bdf8; }
    .card p { margin: 0; font-size: 33px; line-height: 1.4; font-weight: 600; }
    .tip { margin-top: 26px; font-size: 32px; line-height: 1.4; color: #facc15; font-weight: 700; }
  </style>
</head>
<body>
  <h1>4 个高频功能<br>直接拉满效率</h1>
  <div class="cards">
    <div class="card"><h2>1. 智能区块复制</h2><p>正文、列表、代码按语义提取，减少手动删改。</p></div>
    <div class="card"><h2>2. Shift 追加模式</h2><p>多页面摘录可连续合并，研究资料一次成稿。</p></div>
    <div class="card"><h2>3. 表格一键转 CSV</h2><p>开会笔记/竞品表格直接导入表格工具分析。</p></div>
    <div class="card"><h2>4. Prompt 管理器</h2><p>常用提示词同步管理，支持快速打开常用 AI 服务。</p></div>
  </div>
  <div class="tip">隐私边界：默认本地处理，不上传你复制的内容。</div>
</body>
</html>
