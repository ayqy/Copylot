<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 01 Cover</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(155deg, #0f172a 0%, #6d28d9 52%, #f43f5e 100%);
      color: #fff;
      padding: 84px 76px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .badge {
      width: fit-content;
      font-size: 34px;
      font-weight: 900;
      padding: 12px 26px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.15);
    }
    h1 {
      margin: 34px 0 18px;
      font-size: 92px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .sub {
      font-size: 48px;
      line-height: 1.35;
      font-weight: 700;
      max-width: 920px;
    }
    .card {
      margin-top: auto;
      font-size: 42px;
      line-height: 1.35;
      font-weight: 800;
      border-radius: 28px;
      padding: 30px 34px;
      background: rgba(255, 255, 255, 0.14);
      border: 2px solid rgba(255, 255, 255, 0.35);
    }
    .brand {
      position: absolute;
      right: 70px;
      bottom: 52px;
      font-size: 40px;
      font-weight: 900;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="badge">效率实测｜调研/周报/提案场景</div>
  <h1>网页复制
先别再手动洗</h1>
  <div class="sub">3 步变干净输入
每天省下 20~40 分钟</div>
  <div class="card">适用：产品运营复盘 / 竞品分析 / AI 提示词准备</div>
  <div class="brand">Copylot</div>
</body>
</html>
