<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS Cover</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 20% 20%, #ffd3a3 0%, #ff8c42 30%, #ff4d6d 70%, #7b2cbf 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      padding: 88px 76px;
      position: relative;
      overflow: hidden;
    }
    .badge { font-size: 34px; font-weight: 800; letter-spacing: 1px; background: rgba(0,0,0,0.28); padding: 12px 22px; border-radius: 999px; width: fit-content; }
    h1 { margin: 34px 0 22px; font-size: 96px; line-height: 1.06; font-weight: 900; }
    .sub { font-size: 48px; line-height: 1.3; font-weight: 700; max-width: 900px; }
    .value {
      margin-top: auto;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.45);
      border-radius: 28px;
      padding: 34px;
      font-size: 44px;
      line-height: 1.35;
      font-weight: 800;
      backdrop-filter: blur(2px);
    }
    .brand { position: absolute; right: 72px; bottom: 58px; font-size: 40px; font-weight: 800; opacity: 0.95; }
  </style>
</head>
<body>
  <div class="badge">效率工具实测</div>
  <h1>复制不再<br>一团糟</h1>
  <div class="sub">网页内容 3 步变成<br>AI 可直接用的干净文本</div>
  <div class="value">每天少做重复清洗，预计省下 20~40 分钟整理时间</div>
  <div class="brand">Copylot</div>
</body>
</html>
