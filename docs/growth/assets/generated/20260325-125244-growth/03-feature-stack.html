<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 03 Feature Stack</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      padding: 74px 72px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #fff;
      background: radial-gradient(circle at top right, #1d4ed8 0%, #0f172a 54%, #020617 100%);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    h1 {
      margin: 0;
      font-size: 74px;
      line-height: 1.1;
      font-weight: 900;
    }
    .card {
      border-radius: 24px;
      padding: 30px 28px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.22);
    }
    .title {
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 34px;
      line-height: 1.45;
      font-weight: 600;
    }
    .foot {
      margin-top: auto;
      font-size: 34px;
      font-weight: 700;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <h1>核心能力栈</h1>
  <div class="card">
    <div class="title">01 智能区块复制</div>
    <div class="desc">单击/双击快速抽取正文，减少广告、导航、干扰段落。</div>
  </div>
  <div class="card">
    <div class="title">02 表格一键转换</div>
    <div class="desc">网页表格直接转 Markdown / CSV，便于复盘、统计、汇报。</div>
  </div>
  <div class="card">
    <div class="title">03 Shift 追加模式</div>
    <div class="desc">多页面内容顺序合并，访谈与工单资料一次收齐。</div>
  </div>
  <div class="foot">适用于产品、运营、客服、研究等高频信息整理场景</div>
</body>
</html>
