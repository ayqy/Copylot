<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 05 Privacy Proof</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      padding: 76px 70px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #fff;
      background: radial-gradient(circle at 20% 20%, #1d4ed8 0%, #312e81 55%, #111827 100%);
      display: flex;
      flex-direction: column;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 70px;
      font-weight: 900;
      line-height: 1.1;
    }
    .sub {
      margin: 0 0 24px;
      font-size: 34px;
      color: #dbeafe;
      font-weight: 600;
    }
    .card {
      border-radius: 24px;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12);
      padding: 26px;
      margin-bottom: 18px;
    }
    .title {
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 10px;
      color: #fcd34d;
    }
    .desc {
      font-size: 30px;
      line-height: 1.5;
      font-weight: 600;
      color: #f8fafc;
    }
    .note {
      margin-top: auto;
      font-size: 34px;
      line-height: 1.4;
      font-weight: 800;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <h1>效率之外，边界也要稳</h1>
  <p class="sub">复制工具不该用“省时”换“风险”</p>
  <div class="card">
    <div class="title">默认本地处理</div>
    <div class="desc">核心复制与清洗流程优先在本地完成，减少云端依赖。</div>
  </div>
  <div class="card">
    <div class="title">不上传复制内容</div>
    <div class="desc">默认口径：不收集、不上传你复制的网页正文内容。</div>
  </div>
  <div class="card">
    <div class="title">面向高频场景</div>
    <div class="desc">适合调研、写方案、做周报、整理提示词等高频复制流程。</div>
  </div>
  <div class="note">先把复制环节稳定，AI 才能放大你的产出效率</div>
</body>
</html>
