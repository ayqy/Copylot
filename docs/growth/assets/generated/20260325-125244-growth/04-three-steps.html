<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 04 Three Steps</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      padding: 78px 72px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(165deg, #111827 0%, #172554 44%, #581c87 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 74px;
      line-height: 1.1;
      font-weight: 900;
    }
    .step {
      border-radius: 24px;
      padding: 28px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.26);
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .num {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 38px;
      font-weight: 900;
      background: #f59e0b;
      color: #111827;
      flex: none;
    }
    .text {
      font-size: 36px;
      line-height: 1.45;
      font-weight: 700;
    }
    .tip {
      margin-top: auto;
      font-size: 34px;
      line-height: 1.4;
      font-weight: 700;
      color: #fde68a;
    }
  </style>
</head>
<body>
  <h1>3 步进入可用输入</h1>
  <div class="step">
    <div class="num">1</div>
    <div class="text">单击或双击复制核心区块，先拿到干净正文。</div>
  </div>
  <div class="step">
    <div class="num">2</div>
    <div class="text">遇到表格直接转 Markdown / CSV，避免手工补列。</div>
  </div>
  <div class="step">
    <div class="num">3</div>
    <div class="text">按住 Shift 追加多页资料，一次粘贴给 AI。</div>
  </div>
  <div class="tip">从“复制 + 清洗 + 整理”变成“复制 + 直接使用”</div>
</body>
</html>
