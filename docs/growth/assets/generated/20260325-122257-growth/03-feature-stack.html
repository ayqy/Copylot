<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Copylot XHS 03 Feature Stack</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      padding: 76px 70px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #fff;
      background: linear-gradient(180deg, #111827 0%, #0b1020 100%);
      display: flex;
      flex-direction: column;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 68px;
      line-height: 1.15;
      font-weight: 900;
    }
    .sub {
      font-size: 34px;
      color: #cbd5e1;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 6px;
    }
    .card {
      border-radius: 22px;
      padding: 24px;
      min-height: 240px;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06);
    }
    .k {
      font-size: 34px;
      font-weight: 800;
      color: #fcd34d;
      margin-bottom: 12px;
    }
    .v {
      font-size: 30px;
      line-height: 1.45;
      font-weight: 600;
      color: #f8fafc;
    }
    .footer {
      margin-top: auto;
      border-radius: 24px;
      padding: 24px 28px;
      font-size: 34px;
      font-weight: 800;
      color: #111827;
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <h1>核心能力一页看懂</h1>
  <div class="sub">面向“网页信息 -> 可直接使用输入”的最短路径</div>
  <div class="grid">
    <div class="card">
      <div class="k">智能区块复制</div>
      <div class="v">单击/双击提取主体内容，减少导航广告干扰。</div>
    </div>
    <div class="card">
      <div class="k">表格一键转换</div>
      <div class="v">网页表格直接转 Markdown / CSV，后续分析更稳。</div>
    </div>
    <div class="card">
      <div class="k">Shift 追加模式</div>
      <div class="v">跨页面连续复制自动合并，不再散落多个窗口。</div>
    </div>
    <div class="card">
      <div class="k">Prompt 工作流</div>
      <div class="v">指令与素材一次整理，降低重复粘贴成本。</div>
    </div>
  </div>
  <div class="footer">隐私边界：默认本地处理，不上传复制的网页内容</div>
</body>
</html>
