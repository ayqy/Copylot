<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixture Table</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 32px;
      }
      table {
        border-collapse: collapse;
        width: 520px;
      }
      th,
      td {
        border: 1px solid #cbd5e1;
        padding: 10px 12px;
      }
      th {
        background: #eef2ff;
      }
    </style>
  </head>
  <body>
    <h1>Structured Table Fixture</h1>
    <table id="pricing-table">
      <thead>
        <tr>
          <th>Plan</th>
          <th>Requests</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td id="starter-plan">Starter</td>
          <td>100</td>
          <td>$5</td>
        </tr>
        <tr>
          <td>Growth</td>
          <td>500</td>
          <td>$19</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
